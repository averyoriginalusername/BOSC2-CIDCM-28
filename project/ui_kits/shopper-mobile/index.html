<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced — Stylist Mobile</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #ECE7E0; min-height: 100vh; font-family: 'Outfit', system-ui, sans-serif; color: #1A1410; }
  .canvas { padding: 32px 24px 80px; }
  .header { max-width: 1200px; margin: 0 auto 24px; display: flex; align-items: baseline; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
  .title { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; font-size: 32px; letter-spacing: -0.005em; color: #1A1410; line-height: 1; }
  .subtitle { font-size: 13px; color: #8C8278; max-width: 560px; line-height: 1.5; }
  .eyebrow { font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: #8C8278; font-weight: 600; }
  .grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 36px 28px; justify-items: center; align-items: start; }
  .phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .phone-label { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #8C8278; font-weight: 600; }
  .controls { max-width: 1200px; margin: 0 auto 28px; display: flex; gap: 8px; flex-wrap: wrap; }
  .pill { padding: 8px 14px; border-radius: 999px; background: #fff; border: 1px solid #DCD5CB; color: #1A1410; font-family: 'Outfit', sans-serif; font-size: 12.5px; font-weight: 500; cursor: pointer; }
  .pill.active { background: #6B5BD3; color: #fff; border-color: #6B5BD3; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const { useState } = React;

const SCREENS = [
  { id: 'sign-in',         label: 'Sign in',          Comp: SignInScreen,         showNav: false },
  { id: 'signup',          label: 'Sign up',          Comp: SignUpScreen,         showNav: false },
  { id: 'home',            label: 'Home',             Comp: HomeScreen,           showNav: true, active: 'home' },
  { id: 'calendar',        label: 'Calendar',         Comp: CalendarScreen,       showNav: true, active: 'calendar' },
  { id: 'clients',         label: 'Clients',          Comp: ClientsScreen,        showNav: true, active: 'users' },
  { id: 'client-detail',   label: 'Client detail',    Comp: ClientDetailScreen,   showNav: false },
  { id: 'messages-list',   label: 'Messages',         Comp: MessagesListScreen,   showNav: true, active: 'message' },
  { id: 'chat',            label: 'Chat',             Comp: ChatScreen,           showNav: false },
  { id: 'payments',        label: 'Payments',         Comp: PaymentsScreen,       showNav: false },
  { id: 'account',         label: 'Account',          Comp: AccountScreen,        showNav: true, active: 'user' },
];

function Phone({ screenId, state, set, mode = 'tour' }) {
  const s = SCREENS.find(x => x.id === screenId) || SCREENS[0];
  const Comp = s.Comp;
  const go = (next) => {
    if (mode === 'tour') return;
    set({ screen: next });
  };
  // Bottom nav routes
  const navRoute = (k) => ({
    home: 'home',
    calendar: 'calendar',
    message: 'messages-list',
    users: 'clients',
    user: 'account',
  })[k] || 'home';

  return (
    <IOSDevice width={390} height={780}>
      <div style={{ position: 'relative', minHeight: '100%' }}>
        <div style={{ paddingTop: 56 }}>
          <Comp go={go} state={state} set={(p) => set({ ...state, ...p })}/>
        </div>
        {s.showNav && <BottomNav active={s.active || 'home'} onChange={(k) => go(navRoute(k))}/>}
      </div>
    </IOSDevice>
  );
}

function App() {
  const [mode, setMode] = useState('tour');
  const [state, setState] = useState({ screen: 'sign-in' });

  return (
    <div className="canvas">
      <div className="header">
        <div>
          <div className="eyebrow">UI Kit · Stylist mobile</div>
          <h1 className="title" style={{marginTop: 4}}>Sourced for Stylists — on the go</h1>
          <p className="subtitle" style={{marginTop: 6}}>
            The full personal-shopper workspace, condensed for mobile. Sign in, manage today's sessions, review clients, message customers, track finance, and edit your profile — all from the iPhone.
          </p>
        </div>
        <div className="controls">
          <button className={'pill ' + (mode === 'tour' ? 'active' : '')} onClick={() => setMode('tour')}>All screens</button>
          <button className={'pill ' + (mode === 'flow' ? 'active' : '')} onClick={() => { setMode('flow'); setState({screen: 'sign-in'}); }}>Click-thru prototype</button>
        </div>
      </div>

      {mode === 'tour' ? (
        <div className="grid">
          {SCREENS.map(s => (
            <div key={s.id} className="phone-wrap">
              <Phone screenId={s.id} state={state} set={setState} mode="tour"/>
              <div className="phone-label">{s.label}</div>
            </div>
          ))}
        </div>
      ) : (
        <div className="grid" style={{ gridTemplateColumns: '1fr' }}>
          <div className="phone-wrap">
            <Phone screenId={state.screen} state={state} set={setState} mode="flow"/>
            <div className="phone-label">{SCREENS.find(s => s.id === state.screen)?.label || 'Sign in'} — interactive</div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
