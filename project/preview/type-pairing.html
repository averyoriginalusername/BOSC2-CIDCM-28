<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced — Type Pairing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--paper-2); }
  .card { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .face { font-size: 48px; line-height: 1; color: var(--ink); }
  .face.serif { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; }
  .face.sans { font-family: var(--font-sans); font-weight: 700; letter-spacing: -0.03em; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
  .sub { font-family: var(--font-sans); font-size: 13px; color: var(--fg-muted); }
  .roles { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .role { font-size: 10px; padding: 4px 8px; border-radius: 999px; background: var(--paper-3); color: var(--ink-2); letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="card">
    <div class="stack">
      <span class="face serif">Sourced</span>
      <span class="meta">Instrument Serif · 400</span>
      <span class="sub">Editorial flourish.</span>
      <div class="roles"><span class="role">hero</span><span class="role">pull quote</span><span class="role">marketing</span></div>
    </div>
    <div class="stack">
      <span class="face sans">Sourced</span>
      <span class="meta">Outfit · 700 / −4% tracking</span>
      <span class="sub">Wordmark + all UI.</span>
      <div class="roles"><span class="role">wordmark</span><span class="role">UI</span><span class="role">body</span><span class="role">buttons</span></div>
    </div>
  </div>
</body>
</html>
