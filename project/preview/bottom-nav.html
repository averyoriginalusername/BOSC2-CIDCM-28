<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced — Bottom Nav</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--paper-2); font-family: var(--font-sans); display: flex; align-items: center; justify-content: center; }
  .nav { background: var(--paper); border: 1px solid var(--line); border-radius: 24px; padding: 14px 8px; display: grid; grid-template-columns: repeat(4, 1fr); width: 100%; max-width: 380px; box-shadow: var(--shadow-s); }
  .item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 8px; color: var(--ink-3); }
  .item.active { color: var(--coral-500); }
  .item svg { width: 22px; height: 22px; stroke-width: 1.8; }
  .lab { font-size: 11px; font-weight: 500; }
</style>
</head>
<body>
  <div class="nav">
    <div class="item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
      <span class="lab">Home</span>
    </div>
    <div class="item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
      <span class="lab">Bookings</span>
    </div>
    <div class="item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span class="lab">Messages</span>
    </div>
    <div class="item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
      <span class="lab">Profile</span>
    </div>
  </div>
</body>
</html>
