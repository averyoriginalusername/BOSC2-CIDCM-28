<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced — Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--paper-2); font-family: var(--font-sans); }
  .row { display: grid; grid-template-columns: 60px 60px 1fr; align-items: center; gap: 14px; padding: 4px 0; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
  .val  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); text-align: right; }
  .bar  { height: 12px; background: var(--coral-200); border-radius: 4px; }
</style>
</head>
<body>
  <div class="row"><span class="name">--space-1</span><span class="val">4px</span><span><span class="bar" style="width: 4px;"></span></span></div>
  <div class="row"><span class="name">--space-2</span><span class="val">8px</span><span><span class="bar" style="width: 8px;"></span></span></div>
  <div class="row"><span class="name">--space-3</span><span class="val">12px</span><span><span class="bar" style="width: 12px;"></span></span></div>
  <div class="row"><span class="name">--space-4</span><span class="val">16px</span><span><span class="bar" style="width: 16px;"></span></span></div>
  <div class="row"><span class="name">--space-5</span><span class="val">20px</span><span><span class="bar" style="width: 20px;"></span></span></div>
  <div class="row"><span class="name">--space-6</span><span class="val">24px</span><span><span class="bar" style="width: 24px;"></span></span></div>
  <div class="row"><span class="name">--space-7</span><span class="val">32px</span><span><span class="bar" style="width: 32px;"></span></span></div>
  <div class="row"><span class="name">--space-8</span><span class="val">40px</span><span><span class="bar" style="width: 40px;"></span></span></div>
  <div class="row"><span class="name">--space-9</span><span class="val">56px</span><span><span class="bar" style="width: 56px;"></span></span></div>
  <div class="row"><span class="name">--space-10</span><span class="val">80px</span><span><span class="bar" style="width: 80px;"></span></span></div>
  <div class="row"><span class="name">--space-11</span><span class="val">120px</span><span><span class="bar" style="width: 120px;"></span></span></div>
</body>
</html>
