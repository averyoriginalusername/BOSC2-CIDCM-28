<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced — Semantic Color</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--paper-2); font-family: var(--font-sans); }
  .header { font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-subtle); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .sw { padding: 14px 16px; border-radius: 10px; aspect-ratio: 1.6 / 1; display: flex; flex-direction: column; justify-content: space-between; color: white; }
  .lab { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
  .val { font-family: var(--font-mono); font-size: 10px; opacity: 0.85; }
  .role { font-size: 11px; opacity: 0.85; }
</style>
</head>
<body>
  <div class="header">Semantic colors</div>
  <div class="grid">
    <div class="sw" style="background: var(--success);"><span class="lab">success</span><span class="role">payment cleared, contract signed</span><span class="val">#4B8B5A</span></div>
    <div class="sw" style="background: var(--warning);"><span class="lab">warning</span><span class="role">low budget match, schedule clash</span><span class="val">#D89A3E</span></div>
    <div class="sw" style="background: var(--danger);"><span class="lab">danger</span><span class="role">destructive action only</span><span class="val">#C24545</span></div>
    <div class="sw" style="background: var(--info);"><span class="lab">info</span><span class="role">tip cards, AI assistant accents</span><span class="val">#4A7BC7</span></div>
  </div>
</body>
</html>
