<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced — Style Chips & Tier Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--paper-2); font-family: var(--font-sans); }
  .header { font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-subtle); margin-bottom: 12px; font-weight: 600; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
  .chip { padding: 8px 16px; border-radius: 999px; font-size: 13.5px; font-weight: 500; cursor: pointer; transition: all 140ms; font-family: var(--font-sans); }
  .chip.quiet { background: var(--paper-4); color: var(--ink-2); }
  .chip.active { background: var(--ink); color: white; }

  /* Tier badges — magazine-masthead treatment */
  .tiers { display: flex; gap: 10px; align-items: stretch; }
  .badge {
    flex: 1;
    padding: 14px 16px;
    border-radius: 6px;
    display: flex; flex-direction: column; gap: 4px;
    position: relative;
    font-family: var(--font-sans);
  }
  .badge .crest {
    display: flex; align-items: center; gap: 6px;
    font-size: 8.5px; letter-spacing: 0.28em; text-transform: uppercase;
    font-weight: 600;
    opacity: 0.85;
  }
  .badge .crest .star { font-size: 9px; line-height: 1; }
  .badge .crest .rule { flex: 1; height: 1px; background: currentColor; opacity: 0.35; }
  .badge .name {
    font-family: var(--font-display); font-style: italic; font-weight: 400;
    font-size: 26px; letter-spacing: -0.005em; line-height: 1;
    margin-top: 2px;
  }
  .badge .req {
    font-size: 10px; letter-spacing: 0.08em;
    opacity: 0.75;
    margin-top: 2px;
  }

  .b-insider {
    background: var(--paper-3);
    color: var(--ink);
    border: 1px solid var(--line-2);
  }
  .b-icon {
    background: linear-gradient(180deg, var(--lilac-50) 0%, var(--paper) 100%);
    color: var(--lilac-700);
    border: 1px solid var(--lilac-200);
  }
  .b-editorial {
    background: var(--ink);
    color: #E8D9B6;
    border: 1px solid var(--ink);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .b-editorial .name { color: #F2E2BD; }

  .smalls { display: flex; gap: 8px; align-items: center; margin-top: 4px; }
  .pill-tier {
    font-family: var(--font-sans); font-size: 10px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 5px 10px 5px 10px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pill-tier::before { content: '✦'; font-size: 8px; line-height: 1; }
  .p-insider { background: var(--paper-3); color: var(--ink-2); border: 1px solid var(--line-2); }
  .p-icon { background: var(--lilac-100); color: var(--lilac-700); }
  .p-editorial { background: var(--ink); color: #E8D9B6; }

  .lab { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-subtle); margin: 8px 0 8px; font-weight: 600; }
</style>
</head>
<body>
  <div class="header">Style descriptors — quiz chips</div>
  <div class="row">
    <span class="chip quiet">Chic</span>
    <span class="chip quiet">Modern</span>
    <span class="chip quiet">Y2K</span>
    <span class="chip quiet">Cottage Core</span>
    <span class="chip quiet">Vintage</span>
    <span class="chip quiet">80's</span>
    <span class="chip quiet">Summer</span>
    <span class="chip active">boho</span>
    <span class="chip quiet">Cyber punk</span>
  </div>

  <div class="header">SOURCED Collective — tier badges</div>
  <div class="tiers">
    <div class="badge b-insider">
      <div class="crest"><span class="star">✦</span><span>I</span><span class="rule"></span><span>Tier</span></div>
      <div class="name">Insider</div>
      <div class="req">1 purchase / 12 months</div>
    </div>
    <div class="badge b-icon">
      <div class="crest"><span class="star">✦</span><span>II</span><span class="rule"></span><span>Tier</span></div>
      <div class="name">Icon</div>
      <div class="req">1 purchase / month</div>
    </div>
    <div class="badge b-editorial">
      <div class="crest"><span class="star">✦</span><span>III</span><span class="rule"></span><span>Tier</span></div>
      <div class="name">Editorial</div>
      <div class="req">$10,000+ annually</div>
    </div>
  </div>

  <div class="lab">Compact tier pills · for profile chrome</div>
  <div class="smalls">
    <span class="pill-tier p-insider">Insider</span>
    <span class="pill-tier p-icon">Icon</span>
    <span class="pill-tier p-editorial">Editorial</span>
  </div>
</body>
</html>
