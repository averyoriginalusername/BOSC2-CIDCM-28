<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced — Display Type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--paper-2); }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 6px 0; }
  .lab { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-subtle); min-width: 70px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); }
  .editorial { font-family: var(--font-display); font-weight: 400; line-height: 1.05; color: var(--ink); letter-spacing: -0.01em; }
  .editorial em { font-style: italic; color: var(--coral-600); }
</style>
</head>
<body>
  <div class="row">
    <span class="lab">Display XL</span>
    <span class="editorial" style="font-size: 64px;">A place where your <em>fashion</em> needs are met</span>
  </div>
  <div class="meta" style="margin-left:88px;">Instrument Serif · 400 · marketing hero only</div>
</body>
</html>
