<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced — Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--paper-2); font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 10px; }
  .ph { border-radius: 14px; background-size: cover; background-position: center; aspect-ratio: 3/4; }
  .ph.wide { aspect-ratio: auto; height: 100%; }
  .ph1 { background-image: url('../assets/photos/hero-rack.png'); }
  .ph2 { background-image: url('../assets/photos/model-sunglasses.png'); }
  .ph3 { background-image: url('../assets/photos/model-blazer-coffee.png'); }
  .ph4 { background-image: url('../assets/photos/model-selfie-blazer.png'); }
  .note { font-size: 11px; color: var(--fg-subtle); margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>
  <div class="grid">
    <div class="ph ph1 wide"></div>
    <div class="ph ph2"></div>
    <div class="ph ph3"></div>
    <div class="ph ph4"></div>
  </div>
  <div class="note">Untreated editorial fashion — black, cream, beige, brown. Warm skin tones, candid poses, real garments. Never filter, never duotone.</div>
</body>
</html>
