<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced — UI Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--paper-2); }
  .row { display: grid; grid-template-columns: 90px 1fr 130px; align-items: baseline; gap: 16px; padding: 6px 0; }
  .lab { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-subtle); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); text-align: right; }
  .sample { color: var(--ink); font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="row"><span class="lab">H1</span><span class="sample" style="font-size: 40px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1;">Set up your profile</span><span class="meta">40 / 600 · −2%</span></div>
  <div class="row"><span class="lab">H2</span><span class="sample" style="font-size: 30px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.15;">Sophia — Wedding Stylist</span><span class="meta">30 / 600</span></div>
  <div class="row"><span class="lab">H3</span><span class="sample" style="font-size: 18px; font-weight: 600;">Stylist Information</span><span class="meta">18 / 600</span></div>
  <div class="row"><span class="lab">Body</span><span class="sample" style="font-size: 16px; font-weight: 400; line-height: 1.5;">Hi there! Nice to see you again.</span><span class="meta">16 / 400</span></div>
  <div class="row"><span class="lab">Small</span><span class="sample" style="font-size: 14px; color: var(--fg-muted);">Have an account? Sign in</span><span class="meta">14 / 400</span></div>
  <div class="row"><span class="lab">Eyebrow</span><span class="sample" style="font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600; color: var(--fg-subtle);">ABOUT THE MARKET</span><span class="meta">11 / 600 · +16%</span></div>
</body>
</html>
