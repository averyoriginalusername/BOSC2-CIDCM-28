<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sourced — Radius</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--paper-2); font-family: var(--font-sans); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 78px; height: 78px; background: var(--paper); border: 1px solid var(--line-2); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); }
  .use { font-size: 10px; color: var(--fg-muted); text-align: center; max-width: 90px; line-height: 1.3; }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius: 4px;"></div><div class="name">xs · 4</div><div class="use">tag</div></div>
  <div class="item"><div class="box" style="border-radius: 8px;"></div><div class="name">s · 8</div><div class="use">chip, badge</div></div>
  <div class="item"><div class="box" style="border-radius: 12px;"></div><div class="name">m · 12</div><div class="use">input, small card</div></div>
  <div class="item"><div class="box" style="border-radius: 18px;"></div><div class="name">l · 18</div><div class="use">card, image</div></div>
  <div class="item"><div class="box" style="border-radius: 24px;"></div><div class="name">xl · 24</div><div class="use">modal</div></div>
  <div class="item"><div class="box" style="border-radius: 999px;"></div><div class="name">pill · ∞</div><div class="use">CTA, style chip</div></div>
</body>
</html>
